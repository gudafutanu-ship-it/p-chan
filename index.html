<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ピーちゃん</title>
  <style>
    :root{
      --bg1:#fffdf7;
      --bg2:#f7f2e8;
      --card:#ffffff;
      --text:#443c33;
      --sub:#7a6f63;
      --accent:#f2b84b;
      --danger:#d94b4b;
      --off:#b7b7b7;
      --line:#eadfce;
      --shadow:0 10px 30px rgba(80,60,20,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .app{
      width:min(100%, 520px);
      background:rgba(255,255,255,.85);
      backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,.6);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .top{
      padding:20px 18px 8px;
      text-align:center;
    }
    h1{
      margin:0;
      font-size:1.6rem;
      letter-spacing:.02em;
    }
    .sub{
      margin:6px 0 0;
      color:var(--sub);
      font-size:.96rem;
      line-height:1.5;
      min-height:1.5em;
    }
    .bird-wrap{
      padding:10px 18px 6px;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .bird-area{
      width:100%;
      max-width:340px;
      aspect-ratio:1 / 1;
      background:linear-gradient(180deg,#fff 0%, #fffaf1 100%);
      border:1px solid var(--line);
      border-radius:28px;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }
    .bird-area::after{
      content:"";
      position:absolute;
      inset:auto 8% 5% 8%;
      height:12%;
      background:radial-gradient(ellipse at center, rgba(0,0,0,.10), rgba(0,0,0,0));
      filter:blur(6px);
      pointer-events:none;
    }
    #bird{
      width:92%;
      height:92%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      transition:transform .35s ease, opacity .25s ease;
    }
    #bird.listening{
      transform:scale(1.02);
    }
    #bird.idleMove{
      animation:floaty 2.4s ease-in-out infinite;
    }
    @keyframes floaty{
      0%{ transform:translateY(0px) rotate(0deg); }
      25%{ transform:translateY(-2px) rotate(-1deg); }
      50%{ transform:translateY(0px) rotate(0deg); }
      75%{ transform:translateY(2px) rotate(1deg); }
      100%{ transform:translateY(0px) rotate(0deg); }
    }
    .status-row{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      padding:4px 16px 0;
      flex-wrap:wrap;
    }
    .pill{
      border:1px solid var(--line);
      background:#fff;
      color:var(--sub);
      border-radius:999px;
      padding:8px 12px;
      font-size:.9rem;
    }
    .controls{
      padding:14px 16px 12px;
      display:grid;
      gap:12px;
    }
    button{
      appearance:none;
      border:none;
      border-radius:18px;
      padding:18px 18px;
      font-size:1.08rem;
      font-weight:700;
      letter-spacing:.02em;
      cursor:pointer;
      transition:transform .08s ease, opacity .2s ease, background .2s ease;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }
    button:active{ transform:scale(.985); }
    .wake-btn{
      background:linear-gradient(180deg, #ffd774, var(--accent));
      color:#4a3310;
    }
    .talk-btn{
      background:var(--off);
      color:#fff;
    }
    .talk-btn.enabled{
      background:#8f8f8f;
    }
    .talk-btn.listening{
      background:var(--danger);
    }
    .small-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .small-btn{
      padding:14px 12px;
      font-size:.95rem;
      font-weight:700;
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      box-shadow:none;
    }
    .log{
      margin:0 16px 16px;
      background:#fffdfa;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }
    .log h2{
      margin:0 0 10px;
      font-size:1rem;
    }
    .line{
      font-size:.95rem;
      line-height:1.6;
      margin:6px 0;
      word-break:break-word;
    }
    .user{ color:#234; }
    .birdtext{ color:#8a4c00; }
    .muted{ color:var(--sub); }
    .footer{
      padding:0 16px 18px;
      color:var(--sub);
      font-size:.82rem;
      text-align:center;
      line-height:1.5;
    }
    .hidden{ display:none !important; }
    @media (max-width:420px){
      h1{ font-size:1.42rem; }
      button{ font-size:1rem; }
      .small-row{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>ピーちゃん</h1>
      <p id="subMessage" class="sub">すやすや眠っています 💤</p>
    </div>

    <div class="bird-wrap">
      <div class="bird-area">
        <img id="bird" src="sleep.jpg" alt="ピーちゃん" />
      </div>
    </div>

    <div class="status-row">
      <div id="awakePill" class="pill">状態：ねています</div>
      <div id="audioPill" class="pill">音：まだ準備していません</div>
    </div>

    <div class="controls">
      <button id="wakeBtn" class="wake-btn">ピーちゃんを呼ぶ</button>
      <button id="talkBtn" class="talk-btn" disabled>話しかける</button>

      <div class="small-row">
        <button id="repeatBtn" class="small-btn" disabled>もう一度お返事</button>
        <button id="sleepBtn" class="small-btn hidden">ねかせる</button>
      </div>
    </div>

    <div class="log">
      <h2>おしゃべり</h2>
      <div id="logArea">
        <div class="line muted">まだ起きていません。まずは「ピーちゃんを呼ぶ」を押してください。</div>
      </div>
    </div>

    <div class="footer">
      iPhoneでは最初に「ピーちゃんを呼ぶ」を押して、音を準備してから使います。
    </div>
  </div>

  <audio id="peepAudio" src="p_chan.mp3" preload="auto" playsinline webkit-playsinline></audio>

  <script>
    const API_BASE = "https://pichan-config.gudafutanu.workers.dev";
    const MAX_MEMORY = 30;

    const bird = document.getElementById("bird");
    const wakeBtn = document.getElementById("wakeBtn");
    const talkBtn = document.getElementById("talkBtn");
    const repeatBtn = document.getElementById("repeatBtn");
    const sleepBtn = document.getElementById("sleepBtn");
    const logArea = document.getElementById("logArea");
    const subMessage = document.getElementById("subMessage");
    const awakePill = document.getElementById("awakePill");
    const audioPill = document.getElementById("audioPill");
    const peepAudio = document.getElementById("peepAudio");

    let isAwake = false;
    let isListening = false;
    let audioUnlocked = false;
    let recognition = null;
    let recognitionSupported = false;
    let memoryItems = [];
    let blockedWords = [];
    let lastReply = "";
    let idleTimer = null;
    let speakTimer = null;

    function setSub(msg){
      subMessage.textContent = msg;
    }

    function addLog(text, cls = ""){
      const div = document.createElement("div");
      div.className = `line ${cls}`.trim();
      div.textContent = text;
      logArea.prepend(div);
    }

    function clearDefaultLogIfNeeded(){
      const muted = logArea.querySelector(".muted");
      if (muted && logArea.children.length === 1) muted.remove();
    }

    function setBirdImage(src, mode = ""){
      bird.style.opacity = "0.82";
      setTimeout(() => {
        bird.src = src;
        bird.style.opacity = "1";
        bird.classList.remove("listening", "idleMove");
        if (mode === "listening") bird.classList.add("listening");
        if (mode === "idleMove") bird.classList.add("idleMove");
      }, 120);
    }

    function updateUI(){
      if (!isAwake) {
        awakePill.textContent = "状態：ねています";
        talkBtn.disabled = true;
        repeatBtn.disabled = true;
        talkBtn.classList.remove("enabled", "listening");
        talkBtn.textContent = "話しかける";
        audioPill.textContent = audioUnlocked ? "音：準備できました" : "音：まだ準備していません";
        return;
      }

      awakePill.textContent = isListening ? "状態：きいています" : "状態：おきています";
      talkBtn.disabled = false;
      repeatBtn.disabled = !lastReply;
      talkBtn.classList.add("enabled");

      if (isListening) {
        talkBtn.classList.add("listening");
        talkBtn.textContent = "聞いています…";
      } else {
        talkBtn.classList.remove("listening");
        talkBtn.textContent = "話しかける";
      }

      audioPill.textContent = audioUnlocked ? "音：準備できました" : "音：未解放";
    }

    function startIdleMotion(){
      stopIdleMotion();
      idleTimer = setInterval(() => {
        if (!isAwake || isListening) return;
        const r = Math.random();
        if (r < 0.55) {
          setBirdImage("listen2.jpg", "idleMove");
        } else {
          setBirdImage("listen.jpg", "idleMove");
          setTimeout(() => {
            if (isAwake && !isListening) setBirdImage("listen2.jpg", "idleMove");
          }, 900);
        }
      }, 3200);
    }

    function stopIdleMotion(){
      if (idleTimer) clearInterval(idleTimer);
      idleTimer = null;
      bird.classList.remove("idleMove");
    }

    function normalizeText(text){
      return String(text || "")
        .normalize("NFKC")
        .replace(/\s+/g, "")
        .replace(/[。．、，,！!？?「」『』（）()［\]【】]/g, "")
        .toLowerCase();
    }

    function normalizeBirdKey(text){
      return normalizeText(text)
        .replace(/ー+/g, "")
        .replace(/っ/g, "つ")
        .replace(/ゃ/g, "や")
        .replace(/ゅ/g, "ゆ")
        .replace(/ょ/g, "よ")
        .replace(/ぁ/g, "あ")
        .replace(/ぃ/g, "い")
        .replace(/ぅ/g, "う")
        .replace(/ぇ/g, "え")
        .replace(/ぉ/g, "お");
    }

    function compressRepeats(text){
      return text.replace(/(.)\1{2,}/g, "$1$1");
    }

    function toHiraganaLike(text){
      return String(text || "")
        .normalize("NFKC")
        .replace(/[ァ-ヶ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
    }

    function toPichanSpeech(text){
      let t = toHiraganaLike(text);
      t = t.replace(/[a-zA-Z0-9]/g, "");
      t = t.replace(/[。．、，,！!？?「」『』（）()［\]【】]/g, "");
      t = t.replace(/\s+/g, "");
      t = t.replace(/ー+/g, "");
      t = t.replace(/っ/g, "");
      t = t.replace(/ゃ/g, "や").replace(/ゅ/g, "ゆ").replace(/ょ/g, "よ");
      t = t.replace(/ぁ/g, "あ").replace(/ぃ/g, "い").replace(/ぅ/g, "う").replace(/ぇ/g, "え").replace(/ぉ/g, "お");
      t = compressRepeats(t);
      if (t.length > 15) t = t.slice(0, 15);

      if (!t) return "ぴー";
      if (t.includes("おはよう")) return "ぴーちゃん おはよ";
      if (t.includes("かわいい")) return "ぴーちゃん かわい";
      if (t.includes("ぴーちゃん")) return "ぴーちゃん";
      return t;
    }

    function containsBlocked(text){
      const n = normalizeText(text);
      return blockedWords.some(w => n.includes(normalizeText(w)));
    }

    function chooseReply(rawText){
      const n = normalizeBirdKey(rawText);

      if (n.includes("ぴーちゃん")) {
        const arr = ["ぴーちゃん！", "ぴー！", "ぴーちゃん ここ！", "ぴーぴー！"];
        return arr[Math.floor(Math.random() * arr.length)];
      }

      const found = memoryItems.find(item => {
        const key = item.normalized || normalizeBirdKey(item.text || "");
        return key && (n === key || n.includes(key) || key.includes(n));
      });

      if (found && found.reply) return found.reply;
      return toPichanSpeech(rawText);
    }

    function randomDelay(){
      return 2000 + Math.floor(Math.random() * 1500);
    }

    function cancelSpeakTimer(){
      if (speakTimer) clearTimeout(speakTimer);
      speakTimer = null;
    }

    async function unlockAudio(){
      if (audioUnlocked) return true;

      try {
        peepAudio.pause();
        peepAudio.currentTime = 0;

        const p = peepAudio.play();
        if (p && typeof p.then === "function") await p;

        peepAudio.pause();
        peepAudio.currentTime = 0;

        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const warm = new SpeechSynthesisUtterance("");
          warm.volume = 0;
          window.speechSynthesis.speak(warm);
        }

        audioUnlocked = true;
        updateUI();
        return true;
      } catch (e) {
        console.error("音の解放失敗", e);
        audioUnlocked = false;
        updateUI();
        return false;
      }
    }

    async function playPeep(){
      if (!audioUnlocked) return false;
      try {
        peepAudio.pause();
        peepAudio.currentTime = 0;
        const p = peepAudio.play();
        if (p && typeof p.then === "function") await p;
        return true;
      } catch (e) {
        console.error("ピー音再生失敗", e);
        return false;
      }
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;

      try {
        const synth = window.speechSynthesis;
        synth.cancel();

        const doSpeak = () => {
          const uttr = new SpeechSynthesisUtterance(text);
          uttr.lang = "ja-JP";
          uttr.rate = 0.9;
          uttr.pitch = 1.2;
          uttr.volume = 1.0;

          const voices = synth.getVoices();
          const jaVoice =
            voices.find(v => v.lang === "ja-JP") ||
            voices.find(v => v.lang && v.lang.startsWith("ja")) ||
            null;

          if (jaVoice) {
            uttr.voice = jaVoice;
          }

          synth.speak(uttr);

          setTimeout(() => {
            try {
              if (synth.paused) synth.resume();
            } catch (_) {}
          }, 100);
        };

        const voices = synth.getVoices();

        if (voices.length > 0) {
          setTimeout(doSpeak, 120);
        } else {
          synth.onvoiceschanged = () => {
            setTimeout(doSpeak, 120);
          };
          setTimeout(doSpeak, 300);
        }
      } catch (e) {
        console.warn("読み上げ失敗", e);
      }
    }

    async function fetchJSON(path, options = {}){
      const res = await fetch(API_BASE + path, {
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      });
      if (!res.ok) {
        throw new Error(`${path} ${res.status}`);
      }
      return await res.json();
    }

    async function loadBlocked(){
      try {
        const data = await fetchJSON("/blocked/get", { method: "GET" });
        blockedWords = Array.isArray(data) ? data
          : Array.isArray(data.items) ? data.items
          : Array.isArray(data.blocked) ? data.blocked
          : [];
      } catch (e) {
        console.warn("禁止語取得失敗", e);
        blockedWords = [];
      }
    }

    async function loadMemory(){
      try {
        const data = await fetchJSON("/memory/get", { method: "GET" });
        const arr = Array.isArray(data) ? data
          : Array.isArray(data.items) ? data.items
          : Array.isArray(data.memory) ? data.memory
          : [];

        memoryItems = arr.map(item => {
          if (typeof item === "string") {
            return {
              text: item,
              normalized: normalizeBirdKey(item),
              reply: toPichanSpeech(item)
            };
          }
          return {
            text: item.text || item.raw || "",
            normalized: item.normalized || normalizeBirdKey(item.text || item.raw || ""),
            reply: item.reply || toPichanSpeech(item.text || item.raw || "")
          };
        }).slice(0, MAX_MEMORY);
      } catch (e) {
        console.warn("記憶取得失敗", e);
        memoryItems = [];
      }
    }

    async function saveMemory(text){
      const payload = {
        text,
        normalized: normalizeBirdKey(text),
        reply: toPichanSpeech(text),
        ts: Date.now()
      };

      try {
        await fetchJSON("/memory/learn", {
          method: "POST",
          body: JSON.stringify(payload)
        });
      } catch (e) {
        console.warn("記憶保存失敗", e);
      }

      const idx = memoryItems.findIndex(x => x.normalized === payload.normalized);
      if (idx >= 0) memoryItems.splice(idx, 1);

      memoryItems.unshift(payload);
      if (memoryItems.length > MAX_MEMORY) {
        memoryItems = memoryItems.slice(0, MAX_MEMORY);
      }
    }

    function initRecognition(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        recognitionSupported = false;
        setSub("この端末では音声認識に対応していません");
        return;
      }

      recognitionSupported = true;
      recognition = new SR();
      recognition.lang = "ja-JP";
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        setBirdImage("listen.jpg", "listening");
        setSub("聞いています…");
        updateUI();
      };

      recognition.onresult = async (event) => {
        isListening = false;
        updateUI();

        const text = event.results?.[0]?.[0]?.transcript?.trim() || "";
        if (!text) {
          setSub("うまく聞き取れませんでした");
          setBirdImage("listen2.jpg", "idleMove");
          return;
        }

        clearDefaultLogIfNeeded();
        addLog("あなた： " + text, "user");

        if (containsBlocked(text)) {
          setSub("そのことばはおぼえません");
          addLog("ピーちゃん： ぴー…", "birdtext");
          await playPeep();
          setBirdImage("listen2.jpg", "idleMove");
          startIdleMotion();
          return;
        }

        await saveMemory(text);

        const reply = chooseReply(text);
        lastReply = reply;

        setSub("考えています…");
        setBirdImage("listen.jpg", "listening");

        cancelSpeakTimer();
        speakTimer = setTimeout(async () => {
          await playPeep();

          setTimeout(() => {
            speakText(reply);
          }, 250);

          addLog("ピーちゃん： " + reply, "birdtext");
          setSub("お返事しました");
          setBirdImage("listen2.jpg", "idleMove");
          startIdleMotion();
          updateUI();
        }, randomDelay());
      };

      recognition.onerror = (event) => {
        isListening = false;
        updateUI();

        const err = event.error || "unknown";
        console.warn("recognition error:", err);

        if (err === "aborted") {
          setSub("いったん止まりました。もう一度押してください");
        } else if (err === "not-allowed") {
          setSub("マイクの許可が必要です");
        } else if (err === "no-speech") {
          setSub("声が聞こえませんでした");
        } else if (err === "audio-capture") {
          setSub("マイクが使えません。Safariのマイク許可を確認してください");
        } else {
          setSub("音声認識エラー：" + err);
        }

        setBirdImage("listen2.jpg", "idleMove");
        startIdleMotion();
      };

      recognition.onend = () => {
        isListening = false;
        updateUI();
        if (isAwake) {
          setBirdImage("listen2.jpg", "idleMove");
          startIdleMotion();
        }
      };
    }

    async function startListening(){
      if (!isAwake) {
        setSub("まだ寝ています。先に呼んでください");
        return;
      }
      if (!recognitionSupported || !recognition) {
        setSub("この端末では音声認識が使えません");
        return;
      }
      if (isListening) return;

      try {
        stopIdleMotion();
        recognition.start();
      } catch (e) {
        console.warn("recognition.start 失敗", e);
        setSub("少し待ってからもう一度押してください");
      }
    }

    async function wakeUp(){
      if (isAwake) return;

      wakeBtn.disabled = true;
      setSub("起こしています…");

      const ok = await unlockAudio();
      if (!ok) {
        wakeBtn.disabled = false;
        setSub("音の準備に失敗しました。もう一度押してください");
        return;
      }

      await loadBlocked();
      await loadMemory();

      isAwake = true;
      setBirdImage("listen.jpg");
      updateUI();
      clearDefaultLogIfNeeded();

      await playPeep();

      setTimeout(() => {
        speakText("ぴーちゃん");
      }, 250);

      lastReply = "ぴーちゃん！";
      addLog("ピーちゃん： ぴーちゃん！", "birdtext");

      setSub("起きました");
      awakePill.textContent = "状態：おきています";
      wakeBtn.textContent = "ピーちゃんは起きています";
      repeatBtn.disabled = false;

      setTimeout(() => {
        if (!isListening) {
          setBirdImage("listen2.jpg", "idleMove");
          setSub("話しかけてください");
          startIdleMotion();
        }
      }, 1200);

      updateUI();
    }

    function goSleep(){
      cancelSpeakTimer();
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();

      if (recognition && isListening) {
        try { recognition.abort(); } catch (_) {}
      }

      isAwake = false;
      isListening = false;
      lastReply = "";
      stopIdleMotion();
      setBirdImage("sleep.jpg");
      setSub("すやすや眠っています 💤");
      wakeBtn.disabled = false;
      wakeBtn.textContent = "ピーちゃんを呼ぶ";
      updateUI();
    }

    async function repeatReply(){
      if (!isAwake || !lastReply) return;

      await playPeep();

      setTimeout(() => {
        speakText(lastReply);
      }, 250);

      addLog("ピーちゃん： " + lastReply, "birdtext");
      setSub("もう一度お返事しました");
    }

    wakeBtn.addEventListener("click", wakeUp);
    talkBtn.addEventListener("click", startListening);
    repeatBtn.addEventListener("click", repeatReply);
    sleepBtn.addEventListener("click", goSleep);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        if (recognition && isListening) {
          try { recognition.abort(); } catch (_) {}
        }
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
        }
      }
    });

    window.addEventListener("pagehide", () => {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    });

    initRecognition();
    updateUI();
  </script>
</body>
</html>
