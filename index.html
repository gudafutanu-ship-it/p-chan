<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>音声はっきりテスト</title>
<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#f7f7f7;
}
button{
  width:100%;
  margin:10px 0;
  font-size:22px;
  padding:20px;
  border:none;
  border-radius:16px;
}
#log{
  margin-top:20px;
  background:#fff;
  border:1px solid #ccc;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<button onclick="prepare()">① 準備</button>
<button onclick="speak1()">② 短い（単語）</button>
<button onclick="speak2()">③ 中くらい</button>
<button onclick="speak3()">④ 長い文章</button>

<div id="log">ここにログが出ます</div>

<script>
const log = document.getElementById("log");

function write(msg){
  log.textContent += "\n" + msg;
}

function prepare(){
  if(!("speechSynthesis" in window)){
    write("❌ 非対応");
    return;
  }

  const synth = window.speechSynthesis;
  synth.cancel();
  synth.resume();

  // 超小音でウォームアップ
  const u = new SpeechSynthesisUtterance("あ");
  u.volume = 0.01;
  u.lang = "ja-JP";
  synth.speak(u);

  write("準備OK");
}

function speak(text){
  const synth = window.speechSynthesis;

  const run = () => {
    const voices = synth.getVoices();

    write("voices数: " + voices.length);

    const u = new SpeechSynthesisUtterance(text);

    // ⭐ 超重要：まずは普通の声
    u.lang = "ja-JP";
    u.rate = 0.9;   // ゆっくり
    u.pitch = 1.0;  // 変えない
    u.volume = 1.0;

    const ja =
      voices.find(v=>v.lang==="ja-JP") ||
      voices.find(v=>v.lang.startsWith("ja"));

    if(ja){
      u.voice = ja;
      write("voice: " + ja.name);
    }

    u.onstart = ()=>write("▶ 読み上げ開始");
    u.onend = ()=>write("■ 終了");
    u.onerror = (e)=>write("❌ error: "+e.error);

    synth.cancel();
    synth.resume();
    synth.speak(u);
  };

  if(synth.getVoices().length===0){
    write("voices待ち");
    synth.onvoiceschanged = run;
    setTimeout(run,300);
  }else{
    run();
  }
}

function speak1(){
  speak("おはよう");
}

function speak2(){
  speak("今日はいい天気です");
}

function speak3(){
  speak("ピーちゃんはとてもかわいいインコです");
}
</script>

</body>
</html>
