<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>読み上げテスト</title>
  <style>
    body{
      font-family: sans-serif;
      padding:24px;
      background:#f7f7f7;
    }
    button{
      width:100%;
      font-size:24px;
      padding:20px;
      border:none;
      border-radius:16px;
      background:#f2b84b;
    }
    #log{
      margin-top:20px;
      background:#fff;
      border:1px solid #ddd;
      border-radius:12px;
      padding:16px;
      white-space:pre-wrap;
      font-size:18px;
    }
  </style>
</head>
<body>
  <button id="btn">押して読む</button>
  <div id="log">まだです</div>

  <script>
    const log = document.getElementById("log");
    const btn = document.getElementById("btn");

    function write(msg){
      log.textContent += "\n" + msg;
    }

    btn.addEventListener("click", () => {
      if (!("speechSynthesis" in window)) {
        write("speechSynthesis なし");
        return;
      }

      const synth = window.speechSynthesis;
      const voices = synth.getVoices();

      write("voices数: " + voices.length);

      const u = new SpeechSynthesisUtterance("こんにちは ぴーちゃんです");
      u.lang = "ja-JP";
      u.rate = 0.9;
      u.pitch = 1.1;
      u.volume = 1.0;

      const jaVoice =
        voices.find(v => v.lang === "ja-JP") ||
        voices.find(v => v.lang && v.lang.startsWith("ja")) ||
        null;

      if (jaVoice) {
        u.voice = jaVoice;
        write("voice: " + jaVoice.name + " / " + jaVoice.lang);
      } else {
        write("日本語voiceなし");
      }

      u.onstart = () => write("onstart");
      u.onend = () => write("onend");
      u.onerror = (e) => write("onerror: " + (e.error || "unknown"));

      synth.cancel();
      synth.resume();
      synth.speak(u);

      write("speak実行");
    });
  </script>
</body>
</html>
