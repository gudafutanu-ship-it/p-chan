<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピーちゃん</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  text-align:center;
  background:#eef7ff;
  overflow-x:hidden;
}
h2{
  margin:16px 0 8px;
}
.stage{
  height:340px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(to bottom,#eef7ff 0%, #f7fbff 60%, #e3f1ff 100%);
  border-top:1px solid #d6e8f7;
  border-bottom:1px solid #d6e8f7;
}
.bird{
  width:160px;
  position:absolute;
  left:50%;
  top:62%;
  transform:translate(-50%,-50%) rotate(0deg);
  transition:
    left 1.2s ease,
    top 1.2s ease,
    transform 0.7s ease,
    filter 0.4s ease;
  user-select:none;
  -webkit-user-drag:none;
}
.controls{
  margin:16px 0 10px;
}
button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#4da3ff;
  color:#fff;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
}
button:active{
  transform:scale(0.98);
}
.info{
  font-size:14px;
  color:#555;
  min-height:24px;
  margin:8px 12px 20px;
}
.sleepMode{
  opacity:0.92;
  filter:brightness(0.95);
}
.listenGlow{
  filter:drop-shadow(0 0 10px rgba(77,163,255,.75));
}
@keyframes tinyBob {
  0%   { margin-top:0px; }
  50%  { margin-top:-4px; }
  100% { margin-top:0px; }
}
.bob{
  animation: tinyBob 0.9s ease-in-out infinite;
}
</style>
</head>
<body>

<h2>ピーちゃん</h2>

<div class="stage">
  <img id="bird" class="bird" src="sleep.jpg" alt="ピーちゃん">
</div>

<div class="controls">
  <button id="btn">🎤 話しかける</button>
</div>

<div class="info" id="info">話しかけると覚えていきます</div>

<script>
const WORKER_URL = "https://pichan-config.gudafutanu.workers.dev";

const bird = document.getElementById("bird");
const btn = document.getElementById("btn");
const info = document.getElementById("info");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

// ===== Cloudflare保存データ =====
let fullMemory = {};
let partMemory = {};
let bannedWords = [];

let isListening = false;
let recognition = null;
let listenStopTimer = null;

let lastSpokenText = "";
let lastSpokenAt = 0;
let lastChirpAt = 0;
let lastLearnedText = "";
let lastLearnedAt = 0;

const FULL_THRESHOLD = 10;
const PART_THRESHOLD = 2;
const NIGHT_START = 22;
const NIGHT_END = 7;

// ===== Worker通信 =====
async function workerGetMemory(){
  try{
    const res = await fetch(`${WORKER_URL}/memory/get`);
    const data = await res.json();
    if(data.ok && data.memory){
      return data.memory;
    }
  }catch(e){
    console.error("memory/get failed", e);
  }
  return { words:{} };
}

async function workerLearn(text){
  try{
    const res = await fetch(`${WORKER_URL}/memory/learn`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ text })
    });
    return await res.json();
  }catch(e){
    console.error("memory/learn failed", e);
    return { ok:false, learned:false };
  }
}

async function workerReset(){
  try{
    const res = await fetch(`${WORKER_URL}/memory/reset`, {
      method:"POST"
    });
    return await res.json();
  }catch(e){
    console.error("memory/reset failed", e);
    return { ok:false };
  }
}

async function workerGetBlockedWords(){
  try{
    const res = await fetch(`${WORKER_URL}/blocked/get`);
    const data = await res.json();
    if(data.ok && Array.isArray(data.blockedWords)){
      return data.blockedWords;
    }
  }catch(e){
    console.error("blocked/get failed", e);
  }
  return [];
}

// ===== 基本 =====
function nowHour(){
  return new Date().getHours();
}

function isNight(){
  const h = nowHour();
  return h >= NIGHT_START || h < NIGHT_END;
}

function normalizeText(text){
  return (text || "")
    .replace(/\s+/g, " ")
    .replace(/[。！？!?.]+$/g, "")
    .trim();
}

function addCount(target, key, value){
  if(!key) return;

  if(!target[key]){
    target[key] = {
      count: 0,
      last: Date.now(),
      born: Date.now()
    };
  }

  target[key].count += value;
  target[key].last = Date.now();
  if(!target[key].born) target[key].born = Date.now();
}

function getCount(obj){
  if(!obj) return 0;
  if(typeof obj === "number") return obj;
  return Number(obj.count || 0);
}

function getLast(obj){
  if(!obj) return 0;
  if(typeof obj === "number") return 0;
  return Number(obj.last || obj.lastHeardAt || 0);
}

function getBorn(obj){
  if(!obj) return 0;
  if(typeof obj === "number") return 0;
  return Number(obj.born || 0);
}

function isBannedText(text){
  const t = normalizeText(text);
  if(!t) return true;

  return bannedWords.some(word => {
    const w = normalizeText(word);
    return w && t.includes(w);
  });
}

// ===== Cloudflare記憶読み込み =====
async function loadCloudMemory(){
  const remote = await workerGetMemory();
  const words = remote.words || {};

  fullMemory = {};
  partMemory = {};

  for(const [text, meta] of Object.entries(words)){
    fullMemory[text] = {
      count: Number(meta.count || 0),
      last: Number(meta.lastHeardAt || meta.last || 0),
      born: Number(meta.born || meta.lastHeardAt || Date.now())
    };

    const parts = extractParts(text);
    parts.forEach(p => {
      if(isBannedText(p)) return;
      if(p === text){
        addCount(partMemory, p, 0.35 * Math.max(1, Number(meta.count || 0)));
      }else{
        addCount(partMemory, p, 0.28 * Math.max(1, Number(meta.count || 0)));
      }

      partMemory[p].last = Number(meta.lastHeardAt || meta.last || Date.now());
      partMemory[p].born = Number(meta.born || meta.lastHeardAt || Date.now());
    });
  }
}

// ===== 音 =====
function chirp(cb){
  const a = new Audio("p_chan.wav");
  a.volume = 1;
  a.play().catch(()=>{});
  a.onended = ()=>{ if(cb) cb(); };
}

function doubleChirpMaybe(cb){
  chirp(()=>{
    if(Math.random() < 0.45){
      setTimeout(()=>chirp(cb),130);
    }else{
      if(cb) cb();
    }
  });
}

function speakText(text, onend){
  if(!text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  u.rate = 0.95;
  u.pitch = 1.4;
  u.volume = 1;
  u.onend = ()=>{ if(onend) onend(); };
  speechSynthesis.speak(u);
}

// ===== 見た目 =====
function setBirdImage(mode){
  if(isNight()){
    bird.src = "sleep.jpg";
    bird.classList.add("sleepMode");
    bird.classList.remove("listenGlow");
    return;
  }

  bird.classList.remove("sleepMode");

  if(mode === "listen"){
    bird.src = "listen.jpg";
    bird.classList.add("listenGlow");
  }else if(mode === "happy"){
    bird.src = "happy.jpg";
    bird.classList.remove("listenGlow");
  }else{
    bird.src = Math.random() < 0.55 ? "happy.jpg" : "listen.jpg";
    bird.classList.remove("listenGlow");
  }
}

function moveBirdNaturally(stronger = false){
  if(isNight()){
    bird.style.left = "50%";
    bird.style.top = "62%";
    bird.style.transform = "translate(-50%,-50%) rotate(0deg)";
    bird.classList.remove("bob");
    setBirdImage("sleep");
    return;
  }

  const left = 42 + Math.random() * 16;
  const top = 56 + Math.random() * 14;
  const rot = (Math.random() * 18 - 9).toFixed(1);

  bird.style.left = left + "%";
  bird.style.top = top + "%";
  bird.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;

  if(stronger || Math.random() < 0.45){
    bird.classList.add("bob");
  }else{
    bird.classList.remove("bob");
  }
}

// ===== 時間帯補正 =====
function getTimeBoost(text){
  const h = nowHour();

  if(h >= 5 && h < 10){
    if(text.includes("おはよう")) return 1.8;
  }

  if(h >= 19 || h < 2){
    if(text.includes("おやすみ") || text.includes("ねんね")) return 1.8;
  }

  return 1;
}

// ===== 部分学習 =====
function extractParts(text){
  const t = normalizeText(text);
  if(!t || isBannedText(t)) return [];

  const parts = new Set();

  if(t.length >= 2 && t.length <= 12){
    parts.add(t);
  }

  t.split(/[、。,.!！?？\s]+/)
    .map(x => x.trim())
    .filter(x => x.length >= 2)
    .forEach(x => {
      if(!isBannedText(x)) parts.add(x);
    });

  const softTokens = ["ピーちゃん","かわいい","おはよう","おやすみ","こんにちは","すごい","えらい"];
  for(const token of softTokens){
    if(t.includes(token) && !isBannedText(token)) parts.add(token);
  }

  if(t.length >= 4){
    for(let len = 2; len <= 8; len++){
      for(let i = 0; i <= t.length - len; i++){
        const s = t.slice(i, i + len).trim();
        if(s.length < 2) continue;
        if(/[ 　]/.test(s)) continue;
        if(/^[、。,.!！?？]+$/.test(s)) continue;
        if(s === t) continue;
        if(isBannedText(s)) continue;
        if(len >= 5 && Math.random() < 0.55) continue;
        parts.add(s);
      }
    }
  }

  return [...parts].filter(p => {
    if(p.length < 2) return false;
    if(p.length > 12) return false;
    if(/^[ゃゅょァィゥェォッーん]+$/.test(p)) return false;
    return !isBannedText(p);
  });
}

// ===== 学習 =====
async function learn(text){
  const t = normalizeText(text);
  if(!t) return;
  if(isBannedText(t)) return;

  const result = await workerLearn(t);

  if(result.ok && result.learned){
    await loadCloudMemory();
    lastLearnedText = t;
    lastLearnedAt = Date.now();
  }
}

// ===== 候補取得 =====
function getEligibleFullEntries(){
  return Object.entries(fullMemory)
    .map(([k,v]) => ({ text:k, count:getCount(v), last:getLast(v), born:getBorn(v) }))
    .filter(x => x.text && x.count >= FULL_THRESHOLD && !isBannedText(x.text));
}

function getEligiblePartEntries(){
  return Object.entries(partMemory)
    .map(([k,v]) => ({ text:k, count:getCount(v), last:getLast(v), born:getBorn(v) }))
    .filter(x => x.text && x.count >= PART_THRESHOLD && !isBannedText(x.text));
}

function computeNaturalWeight(item, type){
  const now = Date.now();
  const ageMs = now - (item.last || item.born || now);
  const hours = ageMs / (1000 * 60 * 60);

  let freshness;
  if(hours < 1) freshness = 2.2;
  else if(hours < 12) freshness = 1.8;
  else if(hours < 48) freshness = 1.3;
  else freshness = 0.95;

  let agingStyle;
  if(type === "full"){
    agingStyle = hours < 12 ? 1.7 : hours < 72 ? 1.2 : 0.95;
  }else{
    agingStyle = hours < 12 ? 1.1 : hours < 72 ? 1.35 : 1.7;
  }

  let base = item.count * freshness * agingStyle * getTimeBoost(item.text);

  if(lastLearnedText && item.text && lastLearnedText.includes(item.text)){
    base *= 1.5;
  }

  if(item.text === lastSpokenText){
    base *= 0.35;
  }

  return Math.max(0.01, base);
}

function weightedPickFromItems(items, type, maxTake = 8){
  if(!items.length) return "";

  const sorted = [...items]
    .sort((a,b)=>computeNaturalWeight(b, type)-computeNaturalWeight(a, type))
    .slice(0, maxTake)
    .map(x => ({
      text: x.text,
      weight: computeNaturalWeight(x, type)
    }));

  const total = sorted.reduce((s, x) => s + x.weight, 0);
  let r = Math.random() * total;

  for(const item of sorted){
    r -= item.weight;
    if(r <= 0) return item.text;
  }
  return sorted[0].text;
}

function pickNameLike(parts){
  const names = parts.filter(x => x.text === "ピーちゃん" || x.text.includes("ピーちゃん"));
  if(!names.length) return "";
  return weightedPickFromItems(names, "part", 5);
}

function pickCuteLike(parts){
  const cute = parts.filter(x =>
    x.text.includes("かわいい") ||
    x.text.includes("おはよう") ||
    x.text.includes("おやすみ") ||
    x.text.includes("こんにちは")
  );
  if(!cute.length) return "";
  return weightedPickFromItems(cute, "part", 5);
}

function buildRecombinedPhrase(){
  const fulls = getEligibleFullEntries();
  const parts = getEligiblePartEntries();
  if(!parts.length && !fulls.length) return "";

  const name = pickNameLike(parts);
  const cute = pickCuteLike(parts);
  const anyPart = weightedPickFromItems(parts, "part", 8);
  const anyFull = weightedPickFromItems(fulls, "full", 6);

  const patterns = [];

  if(name && cute){
    patterns.push(`${name}${cute}`);
    patterns.push(`${name} ${cute}`);
    patterns.push(`${cute}${name}`);
    patterns.push(`${name}…${cute}`);
  }

  if(name && anyPart && anyPart !== name){
    patterns.push(`${name}${anyPart}`);
    patterns.push(`${name} ${anyPart}`);
    patterns.push(`${name}、${anyPart}`);
  }

  if(cute && anyPart && anyPart !== cute){
    patterns.push(`${anyPart}${cute}`);
    patterns.push(`${cute}`);
  }

  if(name){
    patterns.push(name);
    patterns.push(`${name}、${name}`);
  }

  if(cute){
    patterns.push(cute);
  }

  if(anyPart){
    patterns.push(anyPart);
  }

  if(anyFull){
    patterns.push(anyFull);
  }

  const cleaned = [...new Set(
    patterns
      .map(x => normalizeText(x.replace(/\s+/g, " ").trim()))
      .filter(x => x && x.length <= 18 && !isBannedText(x))
  )];

  if(!cleaned.length) return "";
  return cleaned[Math.floor(Math.random() * cleaned.length)];
}

function chooseNaturalSpeech(){
  const fulls = getEligibleFullEntries();
  const parts = getEligiblePartEntries();

  if(!fulls.length && !parts.length) return "";

  const now = Date.now();
  const justLearned = (now - lastLearnedAt) < 1000 * 60 * 20;

  let result = "";
  const r = Math.random();

  if(justLearned){
    if(r < 0.68 && fulls.length){
      result = weightedPickFromItems(fulls, "full", 6);
    }else if(r < 0.90 && parts.length){
      const shortParts = parts.filter(x => x.text.length <= 8);
      result = weightedPickFromItems(shortParts.length ? shortParts : parts, "part", 8);
    }else{
      result = buildRecombinedPhrase();
    }
  }else{
    if(r < 0.38 && fulls.length){
      result = weightedPickFromItems(fulls, "full", 6);
    }else if(r < 0.72 && parts.length){
      const shortParts = parts.filter(x => x.text.length <= 8);
      result = weightedPickFromItems(shortParts.length ? shortParts : parts, "part", 8);
    }else{
      result = buildRecombinedPhrase();
    }
  }

  result = normalizeText(result);
  if(isBannedText(result)) return "";
  return result;
}

// ===== 返事 =====
function replyAfterListening(recognizedText){
  setBirdImage("happy");
  moveBirdNaturally(true);

  doubleChirpMaybe(()=>{
    const remembered = chooseNaturalSpeech();

    if(!remembered){
      setTimeout(()=>{
        if(!isNight()) setBirdImage("idle");
      },700);
      return;
    }

    if(Math.random() < 0.82){
      lastSpokenText = remembered;
      lastSpokenAt = Date.now();
      info.textContent = `ピーちゃん「${remembered}」`;
      speakText(remembered, ()=>{
        if(!isNight()) setBirdImage("idle");
      });
    }else{
      if(!isNight()) setBirdImage("idle");
    }
  });
}

// ===== 音声認識 =====
function stopRecognitionNow(){
  try{
    if(recognition) recognition.stop();
  }catch(e){}
}

function resetListenStopTimer(){
  clearTimeout(listenStopTimer);
  listenStopTimer = setTimeout(()=>{
    stopRecognitionNow();
  },5000);
}

function startRec(){
  if(isNight()){
    info.textContent = "ピーちゃんは寝ています";
    setBirdImage("sleep");
    return;
  }

  if(!SpeechRecognition){
    alert("このブラウザは音声認識に対応していません");
    return;
  }

  if(isListening) return;

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalText = "";

  recognition.onstart = ()=>{
    isListening = true;
    speechSynthesis.cancel();
    setBirdImage("listen");
    moveBirdNaturally(true);
    info.textContent = "聞いています…";
    resetListenStopTimer();
  };

  recognition.onresult = (e)=>{
    resetListenStopTimer();

    let interim = "";

    for(let i = e.resultIndex; i < e.results.length; i++){
      const part = e.results[i][0].transcript;
      if(e.results[i].isFinal){
        finalText += part;
      }else{
        interim += part;
      }
    }

    const displayText = normalizeText(finalText || interim);
    if(displayText){
      info.textContent = `聞き取り中：${displayText}`;
    }
  };

  recognition.onerror = ()=>{
    info.textContent = "うまく聞き取れませんでした";
  };

  recognition.onend = async ()=>{
    clearTimeout(listenStopTimer);
    isListening = false;

    const text = normalizeText(finalText);

    if(isNight()){
      setBirdImage("sleep");
    }else{
      setBirdImage("idle");
    }

    if(!text){
      info.textContent = "聞こえなかったみたいです";
      return;
    }

    await learn(text);
    replyAfterListening(text);
  };

  recognition.start();
}

// ===== 自動行動 =====
function maybeAutoMove(){
  if(isListening) return;
  moveBirdNaturally(Math.random() < 0.35);
  if(!isNight() && Math.random() < 0.55){
    setBirdImage("idle");
  }
}

function maybeAutoChirp(){
  if(isListening || isNight()) return;
  if(Date.now() - lastChirpAt < 1700) return;

  if(Math.random() < 0.64){
    lastChirpAt = Date.now();
    setBirdImage("happy");
    moveBirdNaturally(true);

    doubleChirpMaybe(()=>{
      setTimeout(()=>{
        if(!isNight()) setBirdImage("idle");
      },400);
    });
  }
}

function maybeTalkToSelf(){
  if(isListening || isNight()) return;
  if(Date.now() - lastSpokenAt < 3200) return;

  const speech = chooseNaturalSpeech();
  if(!speech) return;

  if(Math.random() < 0.30){
    lastSpokenText = speech;
    lastSpokenAt = Date.now();

    setBirdImage("happy");
    moveBirdNaturally(true);
    info.textContent = `ピーちゃん「${speech}」`;

    if(Math.random() < 0.42){
      chirp(()=>{
        setTimeout(()=>speakText(speech),170);
      });
    }else{
      speakText(speech);
    }
  }
}

function maybeNameCall(){
  if(isListening || isNight()) return;
  if(Date.now() - lastSpokenAt < 3000) return;

  const hasName =
    getCount(fullMemory["ピーちゃん"]) >= FULL_THRESHOLD ||
    getCount(partMemory["ピーちゃん"]) >= PART_THRESHOLD;

  if(!hasName) return;

  if(Math.random() < 0.12){
    lastSpokenText = "ピーちゃん";
    lastSpokenAt = Date.now();
    setBirdImage("happy");
    info.textContent = `ピーちゃん「ピーちゃん」`;
    speakText("ピーちゃん");
  }
}

// ===== イベント =====
btn.addEventListener("click", startRec);

// ===== 起動 =====
async function init(){
  bannedWords = await workerGetBlockedWords();
  await loadCloudMemory();

  setInterval(()=>{
    if(isNight()){
      setBirdImage("sleep");
      bird.classList.remove("bob");
      bird.style.left = "50%";
      bird.style.top = "62%";
      bird.style.transform = "translate(-50%,-50%) rotate(0deg)";
      info.textContent = "ピーちゃんは寝ています";
      return;
    }

    maybeAutoMove();
  },1800);

  setInterval(()=>{
    if(isNight()) return;
    maybeAutoChirp();
    maybeTalkToSelf();
    maybeNameCall();
  },2400);

  setInterval(()=>{
    if(isNight()){
      setBirdImage("sleep");
    }else if(!isListening){
      setBirdImage("idle");
    }
  },60000);

  if(isNight()){
    setBirdImage("sleep");
    info.textContent = "ピーちゃんは寝ています";
  }else{
    setBirdImage("idle");
    moveBirdNaturally(true);
    info.textContent = "話しかけると覚えていきます";
  }
}

init();
</script>

</body>
</html>
