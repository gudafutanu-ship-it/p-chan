<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピーちゃん</title>

<style>
body{
  margin:0;
  background:#f5f6f8;
  font-family:sans-serif;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

img{
  width:220px;
  border-radius:20px;
}

.status{
  margin-top:10px;
  font-size:18px;
}

.heard{
  margin-top:10px;
  font-size:16px;
  color:#555;
}

.talkBtn{
  width:100%;
  margin-top:20px;
  padding:28px;
  font-size:22px;
  border:none;
  border-radius:16px;
  background:#9aa0aa;
  color:#fff;
}

.talkBtn.on{
  background:#e53935;
}

.peepBtn{
  width:100%;
  margin-top:10px;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:16px;
  background:#ffd54f;
}
</style>
</head>

<body>
<div class="container">

<img src="listen2.jpg">

<div id="status" class="status">待機中</div>
<div id="heard" class="heard"></div>

<button id="talkBtn" class="talkBtn">話しかける</button>
<button id="peepBtn" class="peepBtn">ピーと鳴く</button>

</div>

<script>
const WORKER = "https://pichan-config.gudafutanu.workers.dev";

let recognition;
let isListening = false;

let memory = [];
let blocked = [];

let silenceTimer = null;
let autoTalkTimer = null;

const MAX = 30;
const AUTO_MS = 120000; // 2分

const talkBtn = document.getElementById("talkBtn");
const peepBtn = document.getElementById("peepBtn");
const statusEl = document.getElementById("status");
const heardEl = document.getElementById("heard");

// =====================
// 音
// =====================
const audio = new Audio("p_chan.mp3");

async function playPeep(){
  try{
    audio.currentTime = 0;
    await audio.play();
  }catch(e){}
}

// =====================
// 状態表示
// =====================
function setStatus(t){
  statusEl.textContent = t;
}

// =====================
// 記憶追加（共通）
// =====================
function addMemory(text){
  text = text.trim();
  if(!text) return;

  // 重複削除
  memory = memory.filter(t => t !== text);

  memory.push(text);

  if(memory.length > MAX){
    memory.shift();
  }
}

// =====================
// ランダム発話
// =====================
function startAutoTalk(){
  clearTimeout(autoTalkTimer);

  autoTalkTimer = setTimeout(async ()=>{
    if(memory.length > 0){
      const word = memory[Math.floor(Math.random()*memory.length)];

      setStatus(word);
      heardEl.textContent = word;

      speak(word);
      await playPeep();
    }else{
      setStatus("ピーちゃん");
      await playPeep();
    }

    startAutoTalk();
  }, AUTO_MS);
}

// =====================
// 音声合成
// =====================
function speak(text){
  if(!window.speechSynthesis) return;

  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "ja-JP";
  speechSynthesis.speak(uttr);
}

// =====================
// 無音停止
// =====================
function resetSilence(){
  clearTimeout(silenceTimer);

  silenceTimer = setTimeout(()=>{
    stopRec();
  },2000);
}

// =====================
// 音声認識
// =====================
function initRec(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();

  recognition.lang = "ja-JP";
  recognition.interimResults = true;

  recognition.onstart = ()=>{
    isListening = true;
    talkBtn.classList.add("on");
    setStatus("聞いています");
    resetSilence();
  };

  recognition.onresult = async (e)=>{
    let text = e.results[e.results.length-1][0].transcript;

    heardEl.textContent = text;
    resetSilence();

    if(!e.results[e.results.length-1].isFinal) return;

    // オフライン
    if(!navigator.onLine){
      addMemory(text);
      startAutoTalk();
      stopRec();
      return;
    }

    // オンライン（禁止語チェック）
    if(blocked.some(w => text.includes(w))){
      setStatus("...");
      stopRec();
      return;
    }

    addMemory(text);
    startAutoTalk();

    // KV保存
    try{
      await fetch(WORKER + "/memory/learn",{
        method:"POST",
        headers:{ "Content-Type":"application/json"},
        body:JSON.stringify({text})
      });
    }catch(e){}

    stopRec();
  };

  recognition.onend = ()=>{
    isListening = false;
    talkBtn.classList.remove("on");
    setStatus("待機中");
  };
}

function startRec(){
  if(isListening) return;
  recognition.start();
}

function stopRec(){
  try{ recognition.stop(); }catch(e){}
}

// =====================
// 初期化
// =====================
async function init(){

  initRec();

  // オンラインならデータ取得
  if(navigator.onLine){
    try{
      const res = await fetch(WORKER + "/memory/get");
      const data = await res.json();

      memory = Object.keys(data.memory || {});
    }catch(e){}

    try{
      const res = await fetch(WORKER + "/blocked/get");
      const data = await res.json();

      blocked = data.list || [];
    }catch(e){}
  }

  startAutoTalk();
}

// =====================
// イベント
// =====================
talkBtn.onclick = ()=> startRec();
peepBtn.onclick = ()=> playPeep();

init();
</script>

</body>
</html>
