<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ピーちゃん</title>
  <style>
    body{
      margin:0;
      background:#f5f6f8;
      color:#222;
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .container{
      max-width:420px;
      margin:0 auto;
      padding:18px;
      text-align:center;
    }
    .card{
      background:#fff;
      border-radius:22px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }
    .photoWrap{
      width:220px;
      height:220px;
      margin:0 auto 12px;
      border-radius:24px;
      overflow:hidden;
      border:3px solid #ffe066;
    }
    .photoWrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .status{
      min-height:30px;
      font-size:22px;
      font-weight:700;
      margin-top:6px;
      word-break:break-word;
    }
    .heard{
      min-height:28px;
      margin-top:8px;
      font-size:16px;
      color:#666;
      word-break:break-word;
    }
    .debug{
      margin-top:10px;
      padding:10px;
      border-radius:12px;
      background:#f3f5f8;
      font-size:13px;
      color:#444;
      text-align:left;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
      min-height:90px;
    }
    .talkBtn{
      width:100%;
      margin-top:18px;
      padding:28px 16px;
      min-height:92px;
      font-size:24px;
      font-weight:700;
      border:none;
      border-radius:18px;
      background:#9aa0aa;
      color:#fff;
      cursor:pointer;
    }
    .talkBtn.on{
      background:#e25b5b;
    }
    .peepBtn{
      width:100%;
      margin-top:12px;
      padding:16px;
      min-height:58px;
      font-size:18px;
      font-weight:700;
      border:none;
      border-radius:16px;
      background:#ffd54f;
      color:#333;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="photoWrap">
        <img id="pichanImg" src="listen2.jpg" alt="ピーちゃん">
      </div>

      <div id="status" class="status">待機中</div>
      <div id="heard" class="heard"></div>
      <div id="debug" class="debug">ここに認識の流れが出ます</div>

      <button id="talkBtn" class="talkBtn">話しかける</button>
      <button id="peepBtn" class="peepBtn">ピーと鳴く</button>
    </div>
  </div>

  <script>
    const WORKER = "https://pichan-config.gudafutanu.workers.dev";
    const AUDIO_FILE = "p_chan.mp3";

    const FRONT_IMG = "listen.jpg";
    const SIDE_IMG  = "listen2.jpg";

    let recognition = null;
    let isListening = false;
    let isStarting = false;
    let audioUnlocked = false;

    let memory = [];
    let blockedWords = [];

    const talkBtn = document.getElementById("talkBtn");
    const peepBtn = document.getElementById("peepBtn");
    const statusEl = document.getElementById("status");
    const heardEl = document.getElementById("heard");
    const debugEl = document.getElementById("debug");
    const pichanImg = document.getElementById("pichanImg");

    function setStatus(text){
      statusEl.textContent = text || "";
    }

    function setHeard(text){
      heardEl.textContent = text || "";
    }

    function logDebug(text){
      const now = new Date();
      const time = now.toLocaleTimeString();
      debugEl.textContent = `[${time}] ${text}\n` + debugEl.textContent;
    }

    function lookFront(){
      pichanImg.src = FRONT_IMG;
    }

    function lookSide(){
      pichanImg.src = SIDE_IMG;
    }

    function setListeningUI(on){
      if(on){
        talkBtn.classList.add("on");
        talkBtn.textContent = "聞いています";
        lookFront();
      }else{
        talkBtn.classList.remove("on");
        talkBtn.textContent = "話しかける";
        lookSide();
      }
    }

    async function unlockAudio(){
      if(audioUnlocked) return true;
      try{
        const a = new Audio(AUDIO_FILE);
        const p = a.play();
        if (p && typeof p.then === "function") await p;
        a.pause();
        a.currentTime = 0;
        audioUnlocked = true;
        logDebug("音の解放OK");
        return true;
      }catch(e){
        logDebug("音の解放失敗");
        return false;
      }
    }

    async function playPeep(){
      try{
        const a = new Audio(AUDIO_FILE);
        await a.play();
      }catch(e){
        logDebug("ピー音再生失敗");
      }
    }

    function speak(text){
      if(!window.speechSynthesis) return;
      try{
        speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = "ja-JP";
        uttr.onstart = () => {
          lookFront();
          logDebug("読み上げ開始: " + text);
        };
        uttr.onend = () => {
          lookSide();
          logDebug("読み上げ終了");
        };
        speechSynthesis.speak(uttr);
      }catch(e){
        logDebug("読み上げ失敗");
      }
    }

    function normalizeBasic(text){
      let t = String(text || "").toLowerCase().trim();
      t = t.replace(/[ァ-ン]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
      t = t.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
      t = t.replace(/[！!？?。、，,.・\s]/g, "");
      return t;
    }

    function toPichanLang(text){
      let t = normalizeBasic(text);
      t = t
        .replace(/ゃ/g, "や")
        .replace(/ゅ/g, "ゆ")
        .replace(/ょ/g, "よ")
        .replace(/ぁ/g, "あ")
        .replace(/ぃ/g, "い")
        .replace(/ぅ/g, "う")
        .replace(/ぇ/g, "え")
        .replace(/ぉ/g, "お");

      t = t.replace(/っ/g, "");
      t = t.replace(/ー+/g, "");
      t = t.replace(/おう/g, "お").replace(/えい/g, "え");
      t = t.replace(/(.)\1{2,}/g, "$1$1");

      if (t.length >= 22) {
        t = t.slice(0, 15);
      } else if (t.length >= 18) {
        t = t.slice(0, 14);
      } else if (t.length >= 16) {
        t = t.slice(0, 15);
      }

      if (!t) t = "ぴ";
      return t;
    }

    function addMemory(rawText){
      const text = toPichanLang(rawText);
      const now = Date.now();
      memory = memory.filter(item => item.text !== text);
      memory.push({ text, updatedAt: now });
      if(memory.length > 30){
        memory.sort((a, b) => a.updatedAt - b.updatedAt);
        memory = memory.slice(memory.length - 30);
      }
      return text;
    }

    function randomReplyDelay(){
      return 2000 + Math.random() * 1500;
    }

    async function replyWithWord(word){
      setStatus(word);
      setHeard(word);

      const delay = randomReplyDelay();
      logDebug("返事待ち " + Math.round(delay) + "ms");

      setTimeout(async () => {
        await unlockAudio();
        await playPeep();
        speak(word);
      }, delay);
    }

    function initRecognition(){
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if(!SR){
        setStatus("音声認識非対応");
        talkBtn.disabled = true;
        logDebug("SpeechRecognitionなし");
        return;
      }

      recognition = new SR();
      recognition.lang = "ja-JP";
      recognition.interimResults = false;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      setStatus("音声認識準備OK");
      logDebug("音声認識準備OK");

      recognition.onstart = () => {
        isStarting = false;
        isListening = true;
        setListeningUI(true);
        setStatus("聞いています");
        logDebug("onstart");
      };

      recognition.onaudiostart = () => logDebug("onaudiostart");
      recognition.onaudioend = () => logDebug("onaudioend");
      recognition.onsoundstart = () => logDebug("onsoundstart");
      recognition.onsoundend = () => logDebug("onsoundend");
      recognition.onspeechstart = () => logDebug("onspeechstart");
      recognition.onspeechend = () => logDebug("onspeechend");
      recognition.onnomatch = () => logDebug("onnomatch");

      recognition.onresult = async (e) => {
        logDebug("onresult");
        try {
          const text = String(e.results[0][0].transcript || "").trim();
          logDebug("認識文字: " + text);

          if (!text) {
            setStatus("きこえなかった");
            return;
          }

          const pichanWord = addMemory(text);
          setHeard(pichanWord);
          await replyWithWord(pichanWord);

          if (navigator.onLine) {
            try{
              await fetch(WORKER + "/memory/learn", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text })
              });
              logDebug("Worker保存OK");
            }catch(err){
              logDebug("Worker保存失敗");
            }
          }
        } catch (err) {
          logDebug("onresult内エラー");
          setStatus("待機中");
        }
      };

      recognition.onerror = (e) => {
        isStarting = false;
        isListening = false;
        setListeningUI(false);
        setStatus("エラー: " + e.error);
        logDebug("onerror: " + e.error);
      };

      recognition.onend = () => {
        isStarting = false;
        isListening = false;
        setListeningUI(false);
        if (statusEl.textContent === "聞いています") {
          setStatus("待機中");
        }
        logDebug("onend");
      };
    }

    function startRecognition(){
      if(!recognition){
        setStatus("音声認識がありません");
        logDebug("recognitionなし");
        return;
      }
      if(isListening || isStarting) return;

      isStarting = true;
      setStatus("録音開始中");
      logDebug("startRecognition");

      try{
        recognition.start();
      }catch(e){
        isStarting = false;
        setStatus("録音開始失敗");
        logDebug("start失敗");
      }
    }

    function stopRecognition(){
      if(!recognition) return;
      try{
        recognition.stop();
        logDebug("stopRecognition");
      }catch(e){
        logDebug("stop失敗");
      }
    }

    talkBtn.addEventListener("click", () => {
      if(isStarting) return;

      if(isListening){
        stopRecognition();
      }else{
        startRecognition();
      }
    });

    peepBtn.addEventListener("click", async () => {
      await unlockAudio();
      setStatus("ぴー");
      setHeard("ぴー");
      await playPeep();
      speak("ぴー");
    });

    async function init(){
      initRecognition();
      lookSide();
    }

    init();
  </script>
</body>
</html>
