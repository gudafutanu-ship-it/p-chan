<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ピーちゃん</title>

  <style>
    body{
      margin:0;
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:#f7f8fb;
    }

    .wrap{
      max-width:600px;
      margin:auto;
      padding:16px;
    }

    .card{
      background:#fff;
      border-radius:20px;
      padding:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .top{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .bird{
      width:110px;
      height:110px;
      border-radius:50%;
      overflow:hidden;
      border:3px solid #ffe066;
    }

    .bird img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .bird.listen{
      transform:scale(1.05);
      transition:0.2s;
    }

    h1{
      margin:0;
      font-size:26px;
    }

    .subtitle{
      font-size:14px;
      color:#666;
    }

    .status{
      margin-top:16px;
      background:#f3f5f8;
      padding:12px;
      border-radius:14px;
    }

    .talkBtn{
      width:100%;
      margin-top:14px;
      padding:18px;
      font-size:22px;
      border:none;
      border-radius:16px;
      background:#9aa0aa;
      color:#fff;
    }

    .talkBtn.on{
      background:#e25b5b;
    }

    .row{
      margin-top:10px;
    }

    .miniBtn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:bold;
      background:#ffe066;
    }

    .section{
      margin-top:16px;
    }

    .box{
      background:#fff;
      border:1px solid #ddd;
      border-radius:14px;
      padding:10px;
      min-height:60px;
    }

    /* チカチカ */
    .flash{
      animation:flashAnim 0.5s;
    }

    @keyframes flashAnim{
      0%{background:#fff3b0;}
      50%{background:#ffe066;}
      100%{background:#f3f5f8;}
    }

  </style>
</head>

<body>
<div class="wrap">
  <div class="card">

    <div class="top">
      <div id="birdFace" class="bird">
        <img src="listen2.jpg">
      </div>

      <div>
        <h1>ピーちゃん</h1>
        <div class="subtitle">
          話しかけると覚えるよ
        </div>
      </div>
    </div>

    <div id="statusBox" class="status">
      <div id="statusMain">待機中です</div>
      <div id="statusSub">ボタンを押してください</div>
    </div>

    <button id="talkBtn" class="talkBtn">🎤 話しかける</button>

    <div class="row">
      <button id="peepBtn" class="miniBtn">♪ ピーと鳴く</button>
    </div>

    <div class="section">
      <h3>いま聞こえた言葉</h3>
      <div id="heardBox" class="box">---</div>
    </div>

  </div>
</div>

<script>
const WORKER = "https://pichan-config.gudafutanu.workers.dev";

let recognition;
let isListening = false;
let isStarting = false;
let audioUnlocked = false;
let blockedWords = [];

const talkBtn = document.getElementById("talkBtn");
const peepBtn = document.getElementById("peepBtn");
const heardBox = document.getElementById("heardBox");
const statusMain = document.getElementById("statusMain");
const statusSub = document.getElementById("statusSub");
const statusBox = document.getElementById("statusBox");
const birdFace = document.getElementById("birdFace");

function setStatus(a,b=""){
  statusMain.textContent = a;
  statusSub.textContent = b;
}

function flash(){
  statusBox.classList.add("flash");
  setTimeout(()=>statusBox.classList.remove("flash"),500);
}

async function unlockAudio(){
  if(audioUnlocked) return;
  try{
    let a = new Audio("p_chan.mp3");
    await a.play();
    a.pause();
    audioUnlocked = true;
  }catch(e){}
}

async function playPeep(){
  try{
    let a = new Audio("p_chan.mp3");
    await a.play();
  }catch(e){}
}

async function loadBlocked(){
  try{
    let r = await fetch(WORKER+"/blocked/get");
    let d = await r.json();
    blockedWords = d.words || [];
  }catch(e){}
}

function isBlocked(t){
  return blockedWords.some(w=>t.includes(w));
}

async function learn(t){
  await fetch(WORKER+"/memory/learn",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text:t})
  });
}

function startRec(){
  if(isListening || isStarting) return;
  isStarting = true;
  recognition.start();
}

function stopRec(){
  if(!isListening) return;
  recognition.stop();
}

function initRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    setStatus("非対応");
    return;
  }

  recognition = new SR();
  recognition.lang = "ja-JP";

  recognition.onstart = ()=>{
    isStarting = false;
    isListening = true;
    talkBtn.classList.add("on");
    setStatus("聞いています");
    birdFace.classList.add("listen");
  };

  recognition.onend = ()=>{
    isListening = false;
    talkBtn.classList.remove("on");
    birdFace.classList.remove("listen");
    setStatus("待機中です");
  };

  recognition.onerror = (e)=>{
    isStarting = false;
    isListening = false;
    talkBtn.classList.remove("on");

    if(e.error==="aborted"){
      setStatus("中断されました");
    }
  };

  recognition.onresult = async (e)=>{
    let text = e.results[0][0].transcript;
    heardBox.textContent = text;

    if(isBlocked(text)){
      setStatus("禁止語です");
      return;
    }

    await learn(text);

    setStatus("覚えました");
    flash();

    await playPeep();
  };
}

talkBtn.onclick = async ()=>{
  await unlockAudio();

  if(isListening){
    stopRec();
  }else{
    startRec();
  }
};

peepBtn.onclick = async ()=>{
  await unlockAudio();
  playPeep();
};

async function init(){
  await loadBlocked();
  initRec();
}

init();
</script>

</body>
</html>
