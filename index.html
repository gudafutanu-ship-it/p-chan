<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピーちゃん</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#fff7b8,#ffe57a);
  text-align:center;
}

.app{
  max-width:500px;
  margin:20px auto;
  background:#fffdf2;
  border-radius:20px;
  padding:15px;
}

.time{font-size:32px;font-weight:bold;}
.date{font-size:14px;color:#777;}

.bird{
  width:90%;
  border-radius:20px;
  transition:0.3s;
}

.btn{
  margin-top:15px;
  padding:15px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background:#ffd84d;
}

.status{margin-top:10px;color:#666;}

</style>
</head>

<body>
<div class="app">

<div class="time" id="time"></div>
<div class="date" id="date"></div>

<img id="bird" class="bird" src="sleep.jpg">

<button id="btn" class="btn">ピーちゃんと話す</button>

<div id="status" class="status">押すと5秒だけ聞きます</div>

<div id="log">ピー</div>
<div id="heard"></div>

</div>

<script>

// =================
// 時計
// =================
setInterval(()=>{
  const now=new Date();
  document.getElementById("time").innerText=
    now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("date").innerText=
    now.toLocaleDateString("ja-JP");
},1000);

// =================
// 状態
// =================
const bird=document.getElementById("bird");
const btn=document.getElementById("btn");

let recognition;
let listening=false;
let timer;

let memory={
  words:{},
  learned:[]
};

// =================
// 鳴き声
// =================
function randomPeep(){
  const list=["ピー","ピッ","ピピ","ピィー"];
  return list[Math.floor(Math.random()*list.length)];
}

// =================
// 鳥状態
// =================
function setBird(state){

  if(state==="listen"){
    bird.src="listen.jpg";
  }

  if(state==="happy"){
    bird.src="happy.jpg";
    setTimeout(()=>setBird("sleep"),1500);
  }

  if(state==="sleep"){
    bird.src="sleep.jpg";
  }
}

// =================
// 音声
// =================
function speak(text){
  document.getElementById("log").innerText=text;

  let u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";
  u.pitch=1.8;
  u.rate=1.1;
  speechSynthesis.speak(u);
}

// =================
// 単語処理
// =================
function learn(text){

  let words=text.split(" ");

  let newWord=false;

  words.forEach(w=>{
    if(!w) return;

    memory.words[w]=(memory.words[w]||0)+1;

    if(memory.words[w]>=10 && !memory.learned.includes(w)){
      memory.learned.push(w);
      newWord=true;
    }
  });

  return newWord;
}

// =================
// よく使う言葉優先
// =================
function speakLearned(){

  if(memory.learned.length===0){
    speak(randomPeep());
    return;
  }

  let total=0;

  memory.learned.forEach(w=>{
    total+=memory.words[w];
  });

  let r=Math.random()*total;

  for(let w of memory.learned){
    r-=memory.words[w];
    if(r<=0){
      speak(w);
      return;
    }
  }
}

// =================
// 呼びかけ検出
// =================
function isCall(text){
  return text.includes("ピーちゃん");
}

// =================
// 音声認識
// =================
function init(){

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;

  recognition=new SR();
  recognition.lang="ja-JP";
  recognition.continuous=true;

  recognition.onstart=()=>{
    listening=true;

    // 起きる演出
    bird.style.transform="scale(0.95)";
    setTimeout(()=>{
      bird.style.transform="scale(1)";
      setBird("listen");
    },100);

    document.getElementById("status").innerText="聞いています";

    // 5秒無音
    clearTimeout(timer);
    timer=setTimeout(()=>{
      recognition.stop();
    },5000);
  };

  recognition.onresult=(e)=>{

    let text=e.results[0][0].transcript;

    document.getElementById("heard").innerText=text;

    clearTimeout(timer);
    timer=setTimeout(()=>recognition.stop(),5000);

    // 呼びかけ優先
    if(isCall(text)){
      speak(randomPeep());
      return;
    }

    let newWord=learn(text);

    if(newWord){
      setBird("happy");
      speak("ピー！");
    }else{
      if(Math.random()<0.3){
        speakLearned();
      }else{
        speak(randomPeep());
      }
    }
  };

  recognition.onend=()=>{
    listening=false;

    // 寝る演出
    bird.style.transform="scale(0.98)";
    setTimeout(()=>{
      setBird("sleep");
      bird.style.transform="scale(1)";
    },300);

    document.getElementById("status").innerText="聞いたよ";
  };

}

init();

// =================
// ボタン
// =================
btn.onclick=()=>{
  if(!recognition) return;

  if(listening){
    recognition.stop();
  }else{
    recognition.start();
  }
};

// =================
// たまに起きる
// =================
setInterval(()=>{
  if(listening) return;

  if(Math.random()<0.2){
    setBird("listen");
    setTimeout(()=>setBird("sleep"),1500);
  }
},15000);

</script>

</body>
</html>
